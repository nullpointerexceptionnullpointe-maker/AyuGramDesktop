name: Build AyuGram Windows

on:
  workflow_dispatch:
  push:
    branches:
      - plugin-loader-work

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          repository: nullpointerexceptionnullpointe-maker/AyuGramDesktop
          ref: plugin-loader-work
          submodules: recursive
          fetch-depth: 1

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Locate Visual Studio
        shell: cmd
        run: |
          where vswhere
          vswhere -latest -products * -property installationPath

      - name: Prepare dependencies in VS dev shell
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`vswhere -latest -products * -property installationPath`) do set VSROOT=%%i
          call "%VSROOT%\Common7\Tools\VsDevCmd.bat" -host_arch=x64 -arch=x64
          cd /d "%GITHUB_WORKSPACE%"
          Telegram\build\prepare\win.bat

      - name: Configure in VS dev shell
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`vswhere -latest -products * -property installationPath`) do set VSROOT=%%i
          call "%VSROOT%\Common7\Tools\VsDevCmd.bat" -host_arch=x64 -arch=x64
          cd /d "%GITHUB_WORKSPACE%\Telegram"
          configure.bat x64 -D TDESKTOP_API_ID=2040 -D TDESKTOP_API_HASH=b18441a1ff607e10a989891a5462e627

      - name: Build Debug in VS dev shell
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`vswhere -latest -products * -property installationPath`) do set VSROOT=%%i
          call "%VSROOT%\Common7\Tools\VsDevCmd.bat" -host_arch=x64 -arch=x64
          cd /d "%GITHUB_WORKSPACE%"
          msbuild out\Telegram.sln /p:Configuration=Debug /p:Platform=x64 /m

      - name: Upload Debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Windows-Debug
          path: out\Debug\*
