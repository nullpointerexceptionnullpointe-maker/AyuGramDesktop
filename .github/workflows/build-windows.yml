name: Build AyuGram Windows

on:
  workflow_dispatch:
  push:
    branches:
      - plugin-loader-work

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          repository: nullpointerexceptionnullpointe-maker/AyuGramDesktop
          ref: plugin-loader-work
          submodules: recursive
          fetch-depth: 1

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup MSVC dev cmd
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Show environment
        shell: cmd
        run: |
          echo VSCMD_ARG_TGT_ARCH=%VSCMD_ARG_TGT_ARCH%
          echo Platform=%Platform%
          where cl
          where msbuild

      - name: Prepare dependencies
        shell: cmd
        run: |
          cd /d "%GITHUB_WORKSPACE%"
          Telegram\build\prepare\win.bat

      - name: Configure
        shell: cmd
        run: |
          cd /d "%GITHUB_WORKSPACE%\Telegram"
          configure.bat x64 -D TDESKTOP_API_ID=2040 -D TDESKTOP_API_HASH=b18441a1ff607e10a989891a5462e627

      - name: Build Debug
        shell: cmd
        run: |
          cd /d "%GITHUB_WORKSPACE%"
          msbuild out\Telegram.sln /p:Configuration=Debug /p:Platform=x64 /m

      - name: Upload Debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Windows-Debug
          path: out\Debug\*
